<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JSON Complexity</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg:        #14161b;
    --panel:     #191c22;
    --panel-2:   #1e222a;
    --border:    #2a2f3a;
    --border-2:  #353b48;
    --text:      #e7e9ee;
    --muted:     #868c9b;
    --muted-2:   #5f6573;
    --accent:    #8aa1ff;
    --accent-dim:#4a5580;
    --guide:     rgba(160,175,215,0.16);
    --guide-hi:  rgba(138,161,255,0.55);
    --good:      #7ee0a8;
    --bad:       #ff8a8a;
    --code-bg:   #12141a;
    --radius:    10px;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex: none;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; margin-right: auto; }
  .brand .mark {
    font-family: "JetBrains Mono", monospace;
    font-weight: 700; font-size: 15px;
    color: var(--accent); letter-spacing: -0.5px;
  }
  .brand .sub { font-size: 12px; color: var(--muted-2); letter-spacing: 0.3px; }

  .controls { display: flex; align-items: center; gap: 10px; }
  button.btn {
    font-family: "Inter", sans-serif;
    font-size: 12.5px; color: var(--text);
    background: var(--panel-2);
    border: 1px solid var(--border-2);
    padding: 7px 12px; border-radius: 7px; cursor: pointer;
    transition: border-color .15s ease, color .15s ease, background .15s ease;
  }
  button.btn:hover { border-color: var(--accent); color: var(--accent); }
  button.btn:active { background: var(--bg); }
  button.btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* ---------- Split layout ---------- */
  .split { flex: 1; display: flex; min-height: 0; position: relative; }
  .pane { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  #editorPane  { width: 46%; }
  #resultPane  { flex: 1; border-left: 1px solid var(--border); }

  .pane-head {
    flex: none;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px; letter-spacing: 1.4px; text-transform: uppercase;
    color: var(--muted-2);
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .status { font-family:"JetBrains Mono",monospace; font-size:10.5px; letter-spacing:.5px; }
  .status.ok  { color: var(--good); }
  .status.err { color: var(--bad); }

  /* ---------- Editor ---------- */
  #editor {
    flex: 1; width: 100%; resize: none; border: none; outline: none;
    background: var(--bg); color: var(--text);
    font-family: "JetBrains Mono", monospace;
    font-size: 13px; line-height: 1.7;
    padding: 20px 22px; tab-size: 2; caret-color: var(--accent);
  }
  #editor::placeholder { color: var(--muted-2); }
  #editor::selection { background: rgba(138,161,255,0.25); }

  /* ---------- pane-head layout ---------- */
  .head-left { display: flex; align-items: center; gap: 12px; }

  /* segmented view switch */
  .seg { display: inline-flex; border: 1px solid var(--border-2); border-radius: 7px; overflow: hidden; }
  .seg button {
    font-family: "Inter", sans-serif;
    font-size: 11px; letter-spacing: .3px;
    text-transform: none;
    color: var(--muted);
    background: transparent; border: none;
    padding: 4px 11px; cursor: pointer;
    transition: background .15s ease, color .15s ease;
  }
  .seg button + button { border-left: 1px solid var(--border-2); }
  .seg button.active { background: var(--accent-dim); color: #eef1ff; }
  .seg button:not(.active):hover { color: var(--text); }
  .seg button:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

  /* ---------- Tree toolbar + breadcrumb ---------- */
  .tree-bar {
    flex: none;
    display: flex; align-items: center; gap: 12px;
    padding: 6px 12px 6px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .breadcrumb {
    flex: 1; min-width: 0;
    display: flex; align-items: center; gap: 4px;
    overflow-x: auto; overflow-y: hidden; white-space: nowrap;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; color: var(--muted);
    scrollbar-width: none;        /* Firefox */
    -ms-overflow-style: none;     /* old Edge / IE */
  }
  .breadcrumb::-webkit-scrollbar { width: 0; height: 0; display: none; } /* WebKit/Blink */
  .breadcrumb .crumb, .breadcrumb .sep, .breadcrumb .hint { flex: none; }
  .breadcrumb .crumb {
    color: var(--muted); cursor: pointer; padding: 1px 3px; border-radius: 4px;
    transition: color .12s ease, background .12s ease;
  }
  .breadcrumb .crumb:hover { color: var(--accent); background: rgba(138,161,255,0.1); }
  .breadcrumb .sep { color: var(--muted-2); }
  .breadcrumb .hint { color: var(--muted-2); font-style: italic; }

  .tree-actions { flex: none; display: flex; gap: 7px; }
  button.btn.tiny { padding: 4px 9px; font-size: 11px; }

  /* ---------- Tree view ---------- */
  #tree {
    flex: 1; overflow: auto;
    padding: 14px 16px 60px;
    font-family: "JetBrains Mono", monospace;
    font-size: 12.5px; line-height: 1.65;
    white-space: nowrap;
  }
  .tree-note { color: var(--muted-2); font-size: 12.5px; white-space: normal; }

  .node-row {
    display: flex; align-items: center; gap: 5px;
    padding: 1px 6px; border-radius: 5px;
    width: fit-content;
  }
  .node-row[data-exp] { cursor: pointer; }
  .node-row:hover { background: rgba(255,255,255,0.035); }
  .node-row.focused {
    background: rgba(138,161,255,0.16);
    box-shadow: inset 0 0 0 1px var(--guide-hi);
  }

  /* icon-only toolbar buttons with delayed tooltip */
  .icon-btn {
    position: relative;
    width: 28px; height: 26px;
    display: inline-flex; align-items: center; justify-content: center;
    padding: 0;
    color: var(--muted);
    background: var(--panel-2);
    border: 1px solid var(--border-2);
    border-radius: 6px; cursor: pointer;
    transition: color .15s ease, border-color .15s ease, background .15s ease;
  }
  .icon-btn:hover { color: var(--accent); border-color: var(--accent); }
  .icon-btn:active { background: var(--bg); }
  .icon-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .icon-btn.ok { color: var(--good); border-color: var(--good); }
  .icon-btn svg { width: 15px; height: 15px; }
  .icon-btn[data-tip]::after {
    content: attr(data-tip);
    position: absolute; top: calc(100% + 7px); right: 0;
    background: var(--panel-2);
    border: 1px solid var(--border-2);
    color: var(--text);
    font-family: "Inter", sans-serif;
    font-size: 11px; letter-spacing: 0;
    padding: 4px 8px; border-radius: 6px; white-space: nowrap;
    opacity: 0; pointer-events: none; transform: translateY(-3px);
    transition: opacity .12s ease, transform .12s ease;
    transition-delay: 0s;
    z-index: 30;
  }
  .icon-btn:hover::after { opacity: 1; transform: translateY(0); transition-delay: .55s; }

  .caret, .spacer { width: 12px; flex: none; text-align: center; color: var(--muted-2); }
  .caret::before { content: "▾"; display: inline-block; font-size: 9px; transition: transform .15s ease; }
  .node.collapsed > .node-row .caret::before { transform: rotate(-90deg); }
  .node.collapsed > .children { display: none; }

  .key { color: #c8cee0; }
  .key.idx { color: var(--muted-2); }
  .colon { color: var(--muted-2); }
  .preview { color: var(--muted-2); }
  .preview i { color: var(--muted); font-style: normal; margin: 0 2px; }
  .node.collapsed > .node-row .preview::after { content: " …"; color: var(--muted-2); }

  .v-string  { color: #ffce7a; }
  .v-number  { color: #ff9ecb; }
  .v-boolean { color: #9be2ff; }
  .v-null    { color: var(--muted-2); font-style: italic; }

  /* vertical indent guide lines (lighter color) */
  .children {
    margin-left: 11px;
    padding-left: 12px;
    border-left: 1px solid var(--guide);
    transition: border-color .12s ease;
  }
  .children:hover { border-left-color: var(--guide-hi); }

  #tree::-webkit-scrollbar { width: 10px; height: 10px; }
  #tree::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 10px; border: 3px solid var(--bg); }
  #tree::-webkit-scrollbar-thumb:hover { background: var(--muted-2); }

  /* ---------- Divider ---------- */
  .divider { width: 9px; flex: none; cursor: col-resize; background: transparent; position: relative; z-index: 5; }
  .divider::before {
    content: ""; position: absolute; top: 0; bottom: 0; left: 50%;
    width: 1px; transform: translateX(-50%);
    background: var(--border); transition: background .15s ease, width .15s ease;
  }
  .divider:hover::before, .divider.dragging::before { background: var(--accent); width: 2px; }
  body.resizing { cursor: col-resize; user-select: none; }

  /* ---------- Results ---------- */
  #result { flex: 1; overflow-y: auto; padding: 22px 24px 60px; }

  .error-box {
    background: rgba(255,138,138,0.06);
    border: 1px solid rgba(255,138,138,0.3);
    color: var(--bad);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-family: "JetBrains Mono", monospace;
    font-size: 12.5px; line-height: 1.6;
  }
  .empty { color: var(--muted-2); font-size: 14px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 15px 16px 14px;
    transition: border-color .15s ease;
  }
  .card:hover { border-color: var(--border-2); }
  .card .val {
    font-family: "JetBrains Mono", monospace;
    font-weight: 700; font-size: 26px; line-height: 1;
    color: var(--accent); letter-spacing: -0.5px;
  }
  .card .name { margin-top: 8px; font-size: 13px; font-weight: 600; color: var(--text); }
  .card .desc { margin-top: 3px; font-size: 11.5px; color: var(--muted-2); line-height: 1.4; }

  .section-label {
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px; letter-spacing: 1.4px; text-transform: uppercase;
    color: var(--muted-2);
    margin: 26px 0 12px;
  }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    display: inline-flex; align-items: baseline; gap: 7px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12.5px; color: var(--muted);
  }
  .chip b { font-family: "JetBrains Mono", monospace; color: var(--text); font-weight: 500; }
  .chip .dot { width: 7px; height: 7px; border-radius: 50%; align-self: center; }

  /* scrollbars */
  #result::-webkit-scrollbar, #editor::-webkit-scrollbar { width: 10px; height: 10px; }
  #result::-webkit-scrollbar-thumb, #editor::-webkit-scrollbar-thumb {
    background: var(--border-2); border-radius: 10px; border: 3px solid var(--bg);
  }
  #result::-webkit-scrollbar-thumb:hover, #editor::-webkit-scrollbar-thumb:hover { background: var(--muted-2); }

  /* ---------- Responsive ---------- */
  @media (max-width: 720px) {
    .split { flex-direction: column; }
    #editorPane, #resultPane { width: 100% !important; flex: 1; }
    #resultPane { border-left: none; border-top: 1px solid var(--border); }
    .divider { display: none; }
    .brand .sub { display: none; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="mark">{ } complexity</span>
      <span class="sub">structural metrics for any json</span>
    </div>
    <div class="controls">
      <button class="btn" id="format">Format</button>
      <button class="btn" id="sample">Sample</button>
      <button class="btn" id="clear">Clear</button>
    </div>
  </header>

  <div class="split" id="split">
    <section class="pane" id="editorPane">
      <div class="pane-head">
        <div class="head-left">
          <span>JSON</span>
          <div class="seg" id="viewSwitch">
            <button data-view="plain" class="active">Plain</button>
            <button data-view="tree">Tree</button>
          </div>
        </div>
        <span class="status" id="status">empty</span>
      </div>

      <div class="tree-bar" id="treeBar" hidden>
        <div class="breadcrumb" id="breadcrumb"><span class="hint">hover a node to see its path</span></div>
        <div class="tree-actions">
          <button class="icon-btn" id="expandAll" data-tip="Expand all (focused)" aria-label="Expand all under focused node">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8M8 12h8"/></svg>
          </button>
          <button class="icon-btn" id="collapseAll" data-tip="Collapse all (focused)" aria-label="Collapse all under focused node">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12h8"/></svg>
          </button>
          <button class="icon-btn" id="copyJq" data-tip="Copy path as jq" aria-label="Copy focused node path as jq">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="8" width="13" height="13" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg>
          </button>
        </div>
      </div>

      <textarea id="editor" spellcheck="false" placeholder="Paste or type JSON here…  // and /* */ comments are allowed"></textarea>
      <div id="tree" hidden></div>
    </section>

    <div class="divider" id="divider" role="separator" aria-label="Resize panes"></div>

    <section class="pane" id="resultPane">
      <div class="pane-head"><span>Metrics</span></div>
      <div id="result"></div>
    </section>
  </div>

<script>
  const editor  = document.getElementById('editor');
  const result  = document.getElementById('result');
  const statusEl = document.getElementById('status');
  const treeEl   = document.getElementById('tree');
  const treeBar  = document.getElementById('treeBar');
  const breadcrumb = document.getElementById('breadcrumb');
  const viewSwitch = document.getElementById('viewSwitch');

  let currentView = 'plain';   // 'plain' | 'tree'
  let lastData = undefined;    // last successfully parsed value
  let lastValid = false;

  const typeColors = {
    object:'#8aa1ff', array:'#7ee0a8', string:'#ffce7a',
    number:'#ff9ecb', boolean:'#9be2ff', null:'#868c9b'
  };

  function typeOf(v){
    return Array.isArray(v) ? 'array' : v === null ? 'null' : typeof v;
  }
  // JSON Pointer token escaping per RFC 6901
  function escapeToken(k){ return String(k).replace(/~/g,'~0').replace(/\//g,'~1'); }

  // Strip // line comments and /* */ block comments, but never touch text
  // inside string literals. Newlines are preserved so parser error line
  // numbers stay aligned with the editor.
  function stripComments(text){
    let out = '', i = 0;
    const n = text.length;
    let inString = false, inLine = false, inBlock = false;
    while (i < n) {
      const c = text[i], next = text[i + 1];
      if (inLine) {
        if (c === '\n') { inLine = false; out += c; }
        i++; continue;
      }
      if (inBlock) {
        if (c === '*' && next === '/') { inBlock = false; i += 2; }
        else { if (c === '\n') out += c; i++; }
        continue;
      }
      if (inString) {
        out += c;
        if (c === '\\') { if (i + 1 < n) { out += text[i + 1]; i += 2; continue; } }
        else if (c === '"') { inString = false; }
        i++; continue;
      }
      if (c === '"') { inString = true; out += c; i++; continue; }
      if (c === '/' && next === '/') { inLine = true; i += 2; continue; }
      if (c === '/' && next === '*') { inBlock = true; i += 2; continue; }
      out += c; i++;
    }
    return out;
  }

  function analyze(data){
    let nodes = 0, objectCount = 0, arrayCount = 0, keyCount = 0,
        maxDepth = 0, maxWidth = 0, maxArrayLen = 0, depthSum = 0;
    const uniqueKeys = new Set();
    const paths = new Set();          // index-generalized pointer patterns
    const typeCount = {};

    (function walk(v, depth, pointer){
      nodes++;
      depthSum += depth;
      if (depth > maxDepth) maxDepth = depth;
      paths.add(pointer);

      const t = typeOf(v);
      typeCount[t] = (typeCount[t] || 0) + 1;

      if (Array.isArray(v)) {
        arrayCount++;
        if (v.length > maxArrayLen) maxArrayLen = v.length;
        // generalize every array index so schema paths collapse (structural richness)
        for (const item of v) walk(item, depth + 1, pointer + '/[]');
      } else if (v && typeof v === 'object') {
        objectCount++;
        const keys = Object.keys(v);
        keyCount += keys.length;
        if (keys.length > maxWidth) maxWidth = keys.length;
        for (const k of keys) {
          uniqueKeys.add(k);
          walk(v[k], depth + 1, pointer + '/' + escapeToken(k));
        }
      }
    })(data, 0, '');

    return {
      maxDepth,
      nodes,
      objectCount,
      arrayCount,
      keyCount,
      uniqueKeys: uniqueKeys.size,
      maxWidth,
      maxArrayLen,
      avgDepth: nodes ? depthSum / nodes : 0,
      pointerCount: paths.size,
      typeCount
    };
  }

  const METRICS = [
    ['maxDepth',     'Maximum depth',        'Deepest nesting level'],
    ['nodes',        'Total nodes',          'Objects, arrays & primitive values'],
    ['objectCount',  'Object count',         'Number of JSON objects'],
    ['arrayCount',   'Array count',          'Number of arrays'],
    ['keyCount',     'Key count',            'Total number of keys'],
    ['uniqueKeys',   'Unique key count',     'Distinct field names'],
    ['maxWidth',     'Max object width',     'Most keys in any object'],
    ['maxArrayLen',  'Max array length',     'Largest array'],
    ['avgDepth',     'Average depth',        'Mean nesting across all nodes'],
    ['pointerCount', 'Unique paths',         'Distinct JSON Pointer paths (indices generalized)']
  ];

  function fmt(v){
    if (typeof v === 'number' && !Number.isInteger(v)) return v.toFixed(2);
    return String(v);
  }

  function render() {
    const raw = editor.value.trim();

    if (!raw) {
      statusEl.textContent = 'empty';
      statusEl.className = 'status';
      result.innerHTML = '<p class="empty">Paste some JSON on the left to see its complexity metrics.</p>';
      lastValid = false; lastData = undefined;
      refreshTree();
      return;
    }

    let data;
    try {
      data = JSON.parse(stripComments(raw));
    } catch (e) {
      statusEl.textContent = 'invalid';
      statusEl.className = 'status err';
      result.innerHTML = '<div class="error-box">Invalid JSON<br>' +
        String(e.message).replace(/</g,'&lt;') + '</div>';
      lastValid = false; lastData = undefined;
      refreshTree();
      return;
    }

    statusEl.textContent = 'valid';
    statusEl.className = 'status ok';
    lastValid = true; lastData = data;

    const m = analyze(data);

    let cards = '';
    for (const [key, name, desc] of METRICS) {
      cards += '<div class="card"><div class="val">' + fmt(m[key]) +
               '</div><div class="name">' + name +
               '</div><div class="desc">' + desc + '</div></div>';
    }

    let chips = '';
    for (const t of Object.keys(m.typeCount)) {
      const c = typeColors[t] || '#868c9b';
      chips += '<span class="chip"><span class="dot" style="background:' + c + '"></span>' +
               t + ' <b>' + m.typeCount[t] + '</b></span>';
    }
    const bytes = new Blob([raw]).size;
    chips += '<span class="chip">size <b>' + bytes.toLocaleString() + ' B</b></span>';

    result.innerHTML =
      '<div class="grid">' + cards + '</div>' +
      '<div class="section-label">Value type distribution</div>' +
      '<div class="chips">' + chips + '</div>';

    refreshTree();
  }

  /* ---------- Tree view ---------- */
  function escHtml(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function escAttr(s){ return escHtml(s).replace(/"/g,'&quot;'); }
  function unescapeToken(t){ return t.replace(/~1/g,'/').replace(/~0/g,'~'); }

  function primitiveHtml(v, t){
    if (t === 'string')  return '"' + escHtml(v) + '"';
    if (t === 'null')    return 'null';
    return escHtml(String(v));
  }

  function buildNode(value, key, pointer){
    const t = typeOf(value);
    const expandable = (t === 'object' || t === 'array');
    let h = '<div class="node">';
    h += '<div class="node-row"' + (expandable ? ' data-exp="1"' : '') +
         ' data-path="' + escAttr(pointer) + '">';
    h += expandable ? '<span class="caret"></span>' : '<span class="spacer"></span>';

    if (key !== null) {
      const isIdx = /^\d+$/.test(key);
      h += '<span class="key' + (isIdx ? ' idx' : '') + '">' + escHtml(key) + '</span>';
      h += '<span class="colon">:</span>';
    }

    if (expandable) {
      const isArr = t === 'array';
      const n = isArr ? value.length : Object.keys(value).length;
      h += '<span class="preview">' + (isArr ? '[' : '{') +
           '<i>' + n + '</i>' + (isArr ? ']' : '}') + '</span>';
      h += '</div>';   // close row
      h += '<div class="children">';
      if (isArr) {
        for (let i = 0; i < value.length; i++)
          h += buildNode(value[i], String(i), pointer + '/' + i);
      } else {
        for (const k of Object.keys(value))
          h += buildNode(value[k], k, pointer + '/' + escapeToken(k));
      }
      h += '</div>';
    } else {
      h += '<span class="v-' + t + '">' + primitiveHtml(value, t) + '</span>';
      h += '</div>';   // close row
    }
    h += '</div>';     // close node
    return h;
  }

  let focusedRow = null;

  function refreshTree(){
    if (currentView !== 'tree') return;
    focusedRow = null;
    if (!lastValid) {
      treeEl.innerHTML = '<div class="tree-note">' +
        (editor.value.trim() ? 'Fix the JSON to view the tree.' : 'Nothing to show yet.') +
        '</div>';
      breadcrumb.innerHTML = '<span class="hint">no data</span>';
      return;
    }
    treeEl.innerHTML = buildNode(lastData, null, '');
    // default focus = root node
    const root = treeEl.querySelector('.node-row[data-path=""]');
    if (root) setFocus(root);
  }

  function setFocus(row){
    if (focusedRow) focusedRow.classList.remove('focused');
    focusedRow = row;
    row.classList.add('focused');
    showBreadcrumb(row.getAttribute('data-path'));
  }

  // click: caret toggles that node; anywhere on a row focuses it
  treeEl.addEventListener('click', (e) => {
    const row = e.target.closest('.node-row');
    if (!row) return;
    if (e.target.closest('.caret') && row.hasAttribute('data-exp')) {
      row.parentElement.classList.toggle('collapsed');
    }
    setFocus(row);
  });

  function showBreadcrumb(pointer){
    const tokens = pointer ? pointer.split('/').slice(1) : [];
    let cum = '';
    let html = '<span class="crumb" data-goto="">root</span>';
    for (const tok of tokens) {
      cum += '/' + tok;
      html += '<span class="sep">›</span>' +
              '<span class="crumb" data-goto="' + escAttr(cum) + '">' +
              escHtml(unescapeToken(tok)) + '</span>';
    }
    breadcrumb.innerHTML = html;
  }

  // clicking a crumb reveals, focuses, and scrolls to that node
  breadcrumb.addEventListener('click', (e) => {
    const crumb = e.target.closest('.crumb');
    if (!crumb) return;
    const path = crumb.getAttribute('data-goto');
    const row = treeEl.querySelector('.node-row[data-path="' + cssEscape(path) + '"]');
    if (!row) return;
    let node = row.parentElement;
    while (node && node !== treeEl) {
      if (node.classList && node.classList.contains('node')) node.classList.remove('collapsed');
      node = node.parentElement;
    }
    setFocus(row);
    row.scrollIntoView({ block: 'center', behavior: 'smooth' });
  });

  function cssEscape(s){ return String(s).replace(/["\\]/g, '\\$&'); }

  // Expand / collapse all — scoped to the focused node's subtree
  document.getElementById('expandAll').addEventListener('click', () => {
    if (!focusedRow) return;
    const node = focusedRow.parentElement;
    node.classList.remove('collapsed');
    node.querySelectorAll('.node').forEach(n => n.classList.remove('collapsed'));
  });
  document.getElementById('collapseAll').addEventListener('click', () => {
    if (!focusedRow) return;
    const node = focusedRow.parentElement;
    node.classList.remove('collapsed'); // keep focused node itself open
    node.querySelectorAll('.node-row[data-exp]').forEach(r => {
      if (r !== focusedRow) r.parentElement.classList.add('collapsed');
    });
  });

  // JSON Pointer -> jq path accessor
  function pointerToJq(pointer){
    const tokens = pointer ? pointer.split('/').slice(1).map(unescapeToken) : [];
    if (!tokens.length) return '.';
    let out = '';
    for (const tok of tokens) {
      if (/^\d+$/.test(tok)) out += '[' + tok + ']';
      else if (/^[A-Za-z_][A-Za-z0-9_]*$/.test(tok)) out += '.' + tok;
      else out += '["' + tok.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"]';
    }
    if (out[0] === '[') out = '.' + out;   // e.g. .[0].name
    return out;
  }

  document.getElementById('copyJq').addEventListener('click', async (e) => {
    const btn = e.currentTarget;
    const path = focusedRow ? focusedRow.getAttribute('data-path') : '';
    const jq = pointerToJq(path);
    const origTip = btn.getAttribute('data-tip');
    try {
      await navigator.clipboard.writeText(jq);
      btn.classList.add('ok');
      btn.setAttribute('data-tip', 'Copied  ' + jq);
    } catch (_) {
      btn.setAttribute('data-tip', jq);
    }
    setTimeout(() => {
      btn.classList.remove('ok');
      btn.setAttribute('data-tip', origTip);
    }, 1600);
  });

  // view switch
  viewSwitch.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-view]');
    if (!btn) return;
    currentView = btn.dataset.view;
    [...viewSwitch.children].forEach(b => b.classList.toggle('active', b === btn));
    const tree = currentView === 'tree';
    editor.hidden = tree;
    treeEl.hidden = !tree;
    treeBar.hidden = !tree;
    if (tree) refreshTree();
  });

  editor.addEventListener('input', render);

  document.getElementById('clear').addEventListener('click', () => {
    editor.value = ''; editor.focus(); render();
  });

  document.getElementById('format').addEventListener('click', () => {
    try {
      editor.value = JSON.stringify(JSON.parse(stripComments(editor.value)), null, 2);
      render();
    } catch (_) { render(); }
  });

  document.getElementById('sample').addEventListener('click', () => {
    editor.value = SAMPLE; render();
  });

  // Tab inserts two spaces
  editor.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = editor.selectionStart, en = editor.selectionEnd;
      editor.value = editor.value.slice(0, s) + '  ' + editor.value.slice(en);
      editor.selectionStart = editor.selectionEnd = s + 2;
      render();
    }
  });

  /* ---------- Draggable divider ---------- */
  const split    = document.getElementById('split');
  const divider  = document.getElementById('divider');
  const editPane = document.getElementById('editorPane');
  let dragging = false;

  divider.addEventListener('mousedown', () => {
    dragging = true;
    divider.classList.add('dragging');
    document.body.classList.add('resizing');
  });
  window.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
    document.body.classList.remove('resizing');
  });
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const rect = split.getBoundingClientRect();
    let pct = ((e.clientX - rect.left) / rect.width) * 100;
    pct = Math.max(18, Math.min(82, pct));
    editPane.style.width = pct + '%';
  });

  const SAMPLE = JSON.stringify({
    store: {
      name: "Corner Books",
      open: true,
      tags: ["indie", "coffee", "events"],
      inventory: [
        { id: 1, title: "Dune", genres: ["sci-fi"], stock: 4, meta: { rare: false } },
        { id: 2, title: "The Odyssey", genres: ["classic", "poetry"], stock: 0, meta: { rare: true, note: null } }
      ],
      hours: { mon: [9, 18], sat: [10, 16] }
    }
  }, null, 2);

  editor.value = SAMPLE;
  render();
</script>
</body>
</html>
